<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>The promotional products industry is $26B</title>
<style>
@font-face {
    font-family: 'Poppins';
    font-weight: 700;
    src: url('file:///app/social_studio/static/social/taggiq/Poppins-Bold.ttf') format('truetype');
    font-display: block;
}
@font-face {
    font-family: 'Poppins';
    font-weight: 600;
    src: url('file:///app/social_studio/static/social/taggiq/Poppins-SemiBold.ttf') format('truetype');
    font-display: block;
}
@font-face {
    font-family: 'Inter';
    font-weight: 400;
    src: url('file:///app/social_studio/static/social/taggiq/Inter-Regular.ttf') format('truetype');
    font-display: block;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    width: 1200px;
    height: 1200px;
    overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif;
    color: #1E2030;
    background: #FAF8F5;
    -webkit-font-smoothing: antialiased;
}

.canvas {
    width: 1200px;
    height: 1200px;
    padding: 80px;
    display: flex;
    flex-direction: column;
    position: relative;
    background: #FAF8F5;
}

.accent {
    position: absolute;
    top: 0;
    left: 0;
    width: 8px;
    height: 1200px;
    background: #7C3AED;
}

.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    margin-bottom: 40px;
}

.logo {
    height: 64px;
    width: auto;
}

.tag {
    background: #F3F0FF;
    color: #6D28D9;
    padding: 10px 22px;
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 15px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
}

.kicker {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 20px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #64748B;
    margin-bottom: 36px;
}

.stat {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 260px;
    line-height: 0.92;
    letter-spacing: -0.035em;
    color: #1E2030;
    margin-bottom: 8px;
}

.stat .unit {
    color: #7C3AED;
    font-size: 260px;
}

.stat .suffix {
    color: #7C3AED;
    font-size: 160px;
    margin-left: 8px;
}

.subhead {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 48px;
    line-height: 1.15;
    color: #1E2030;
    max-width: 880px;
    margin: 64px auto 0;
}

.contrast {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 48px;
}

.contrast-pill {
    background: #FFFFFF;
    border: 1px solid #E2E8F0;
    border-radius: 999px;
    padding: 12px 24px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 20px;
    color: #475569;
    display: flex;
    align-items: center;
    gap: 12px;
}

.contrast-pill .icon {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: #F44336;
}

.contrast-pill .icon.good {
    background: #12B488;
}

.footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 24px;
    border-top: 1px solid #E2E8F0;
    flex-shrink: 0;
}

.footer .hashtags {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 17px;
    color: #64748B;
    letter-spacing: 0.02em;
}

.footer .url {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 17px;
    color: #64748B;
}
</style>
</head>
<body>
<div class="canvas">
    <div class="accent"></div>

    <div class="header">
        <img class="logo" src="file:///app/social_studio/static/social/taggiq/logo.png" alt="TaggIQ">
        <div class="tag">Industry</div>
    </div>

    <div class="content">
        <div class="kicker">The Promotional Products Industry</div>
        <div class="stat"><span class="unit">$</span>26<span class="suffix">BILLION</span></div>
        <div class="subhead">Still running on spreadsheets,<br>email threads, and sticky notes.</div>

        <div class="contrast">
            <div class="contrast-pill"><span class="icon"></span>Quoting: 45 min</div>
            <div class="contrast-pill"><span class="icon"></span>Artwork: 12 emails</div>
            <div class="contrast-pill"><span class="icon"></span>Invoicing: detective work</div>
        </div>
    </div>

    <div class="footer">
        <div class="hashtags">#TaggIQ  ·  #PromoIndustry  ·  #B2BSaaS</div>
        <div class="url">taggiq.com</div>
    </div>
</div>
</body>
</html>
