services:
  postgres:
    image: postgres:16-alpine
    container_name: outreach_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: outreach
      POSTGRES_USER: outreach
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    ports:
      - "5433:5432"  # 5433 on host (TaggIQ uses 5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outreach"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    container_name: outreach_web
    restart: unless-stopped
    ports:
      - "8002:8002"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://outreach:${POSTGRES_PASSWORD:-localdev}@postgres:5432/outreach
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8002"

  cron:
    build: .
    container_name: outreach_cron
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://outreach:${POSTGRES_PASSWORD:-localdev}@postgres:5432/outreach
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    command: ["/app/docker/cron-entrypoint.sh"]

volumes:
  pgdata:
